<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bzarlu | Official</title>
    
    <link rel="icon" href="data:,">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #ffffff;
            color: #1a1a1a;
        }

        /* Logo Styling */
        .logo-container {
            padding: 20px;
            text-align: center;
        }
        .logo {
            max-width: 150px; /* Adjust size here */
            height: auto;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Social Media Section */
        .social-links {
            margin-top: 20px;
        }
        .social-links a {
            text-decoration: none;
            color: #333;
            margin: 0 15px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: color 0.3s;
        }
        .social-links a:hover {
            color: #007bff; /* Color change on hover */
        }

        /* Footer */
        .main-footer {
            width: 100%;
            padding: 40px 0;
            background-color: #fafafa;
            border-top: 1px solid #eeeeee;
            text-align: center;
        }
        .footer-content p {
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header class="logo-container">
        <!-- Updated: Load logo directly from your GitHub repo (replace with your actual raw URL) -->
        <img src="https://raw.githubusercontent.com/YOUR-USERNAME/YOUR-REPO-NAME/main/logo.png" 
             alt="Bzarlu Logo" 
             class="logo" 
             onerror="this.style.display='none'; console.log('Logo failed to load from GitHub');">
        <h1 id="text-logo">Bzarlu</h1> 
    </header>

    <main>
        <p>Connect with us on social media:</p>
        
        <div class="social-links">
            <a href="https://x.com/bzarlu1" target="_blank">X (Twitter)</a>
            <a href="https://www.tiktok.com/@bzarlu_official" target="_blank">TikTok</a>
            <a href="https://www.youtube.com/@bzarlu" target="_blank">YouTube</a>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; <span id="year"></span> <strong>Bzarlu</strong>. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

</body>
</html>
