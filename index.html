<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bzarlu | Official</title>
    
    <link rel="icon" href="data:,">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #ffffff;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        /* Dark overlay for readability */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.50);
            z-index: -2;
        }

        .logo-container {
            padding: 40px 20px 20px;
            text-align: center;
        }
        .logo {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto 10px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1, p, .social-links a {
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 3.5rem;
            margin: 10px 0;
        }

        p {
            font-size: 1.3rem;
            margin-bottom: 30px;
        }

        .social-links {
            margin-top: 20px;
        }
        .social-links a {
            text-decoration: none;
            color: #ffffff;
            margin: 0 20px;
            font-weight: bold;
            font-size: 1.4rem;
            transition: color 0.3s, transform 0.2s;
        }
        .social-links a:hover {
            color: #ffaa00;
            transform: scale(1.1);
        }

        .main-footer {
            width: 100%;
            padding: 40px 0;
            background: rgba(0, 0, 0, 0.6);
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            margin-top: auto;
        }
        .footer-content p {
            font-size: 0.9rem;
            color: #cccccc;
            margin: 0;
        }

        @media (max-width: 600px) {
            .logo { max-width: 180px; }
            h1 { font-size: 2.8rem; }
            .social-links a { font-size: 1.2rem; margin: 0 15px; }
        }
    </style>
</head>
<body>

    <header class="logo-container">
        <img src="logo.png" 
             alt="Bzarlu Logo" 
             class="logo" 
             onerror="this.style.display='none'; console.log('Logo failed to load');">
        <h1>Bzarlu</h1> 
    </header>

    <main>
        <p>Connect with us on social media:</p>
        
        <div class="social-links">
            <a href="https://x.com/bzarlu1" target="_blank">X (Twitter)</a>
            <a href="https://www.tiktok.com/@bzarlu_official" target="_blank">TikTok</a>
            <a href="https://www.youtube.com/@bzarlu" target="_blank">YouTube</a>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; <span id="year"></span> <strong>Bzarlu</strong>. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

</body>
</html>
