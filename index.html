<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bzarlu | Official Site</title>
    <style>
        /* Basic Reset */
        body, h1, p {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #ffffff;
            color: #333;
        }

        /* Main Content Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            color: #222;
            margin-bottom: 10px;
        }

        /* Footer Styles */
        .main-footer {
            width: 100%;
            padding: 25px 0;
            background-color: #fcfcfc;
            border-top: 1px solid #eeeeee;
            text-align: center;
        }

        .footer-content p {
            color: #777;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .current-year {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <main>
        <h1>Bzarlu</h1>
        <p>Welcome to the official page.</p>
        </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; <span id="year" class="current-year"></span> **Bzarlu**. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Automatically updates the year to 2026
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

</body>
</html>
